apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: games-dataminer-database
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3

  bootstrap:
    initdb:
      database: games-dataminer
      owner: games-dataminer

  enableSuperuserAccess: true

  resources:
    requests:
      memory: "512Mi"
      cpu: 100m
    limits:
      memory: "1Gi"
      cpu: '2'

  storage:
    size: 1Gi
