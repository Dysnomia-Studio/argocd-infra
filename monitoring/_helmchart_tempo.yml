apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
  project: default
  sources:
    - chart: tempo
      repoURL: https://grafana-community.github.io/helm-charts
      targetRevision: 2.0.0
      helm:
        values: |
          tempo:
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 2Gi
            reportingEnabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
