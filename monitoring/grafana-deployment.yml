apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - image: ghcr.io/dysnomia-studio/grafana:main
        name: grafana
        ports:
        - containerPort: 3000
        env:
          - name: GF_INSTALL_PLUGINS
            value: 'petrslavotinek-carpetplot-panel'

          - name: DS_FACTORY_USERNAME
            valueFrom:
              secretKeyRef:
                name: grafana-dk6hh79bb5
                key: username
                optional: false
          - name: DS_FACTORY_HOST
            value: factory-server-prod-database-ro.factory-server-prod.svc.cluster.local
          - name: DS_FACTORY_DB
            value: factory-server-prod
          - name: DS_FACTORY_PASSWORD
            valueFrom:
              secretKeyRef:
                name: grafana-dk6hh79bb5
                key: password
                optional: false

          - name: DS_LUMEN_USERNAME
            valueFrom:
              secretKeyRef:
                name: grafana-dk6hh79bb5
                key: username
                optional: false
          - name: DS_LUMEN_HOST
            value: lumen-server-database-ro.lumen-server.svc.cluster.local
          - name: DS_LUMEN_DB
            value: lumen-server
          - name: DS_LUMEN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: grafana-dk6hh79bb5
                key: password
                optional: false

          - name: DS_REDMINE_USERNAME
            valueFrom:
              secretKeyRef:
                name: grafana-dk6hh79bb5
                key: username
                optional: false
          - name: DS_REDMINE_HOST
            value: redmine-database-ro.redmine.svc.cluster.local
          - name: DS_REDMINE_DB
            value: redmine
          - name: DS_REDMINE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: grafana-dk6hh79bb5
                key: password
                optional: false

          # Oauth config
          - name: GF_AUTH_GENERIC_OAUTH_ENABLED
            value: "true"
          - name: GF_AUTH_GENERIC_OAUTH_NAME
            value: authentik
          - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: grafana-dk6hh79bb5
                key: oauthclientid
                optional: false
          - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: grafana-dk6hh79bb5
                key: oauthclientsecret
                optional: false
          - name: GF_AUTH_GENERIC_OAUTH_SCOPES
            value: openid profile email
          - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
            value: https://sso.dysnomia.studio/application/o/authorize/
          - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
            value: https://sso.dysnomia.studio/application/o/token/
          - name: GF_AUTH_GENERIC_OAUTH_API_URL
            value: https://sso.dysnomia.studio/application/o/userinfo/
          - name: GF_AUTH_SIGNOUT_REDIRECT_URL
            value: https://sso.dysnomia.studio/application/o/<application_slug>/end-session/
          - name: GF_AUTH_OAUTH_AUTO_LOGIN
            value: "true"
          - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
            value: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
          - name: GF_SERVER_ROOT_URL
            value: http://grafana.monitoring.svc.cluster.local

        imagePullPolicy: Always
        resources:
          requests:
            cpu: 25m
            memory: 150Mi
          limits:
            cpu: 1000m
            memory: 1000Mi
      imagePullSecrets:
      - name: github
